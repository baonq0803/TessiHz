# ============================================
#  TessiHz — Docker Compose
# ============================================

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://tessihz.onrender.com}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.onrender.com}
      - DATABASE_URL=/tmp/tessihz.db
    volumes:
      - ./server/data:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
