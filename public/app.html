<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TessiHz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* ========== ANIMATED BG ========== */
        #app-canvas { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; }

        /* ========== TOP NAVBAR ========== */
        .top-navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 64px; padding: 0 28px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(8,8,12,0.7);
            backdrop-filter: blur(30px) saturate(1.4);
            -webkit-backdrop-filter: blur(30px) saturate(1.4);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            font-family: var(--font-sans); font-weight: 700;
            font-size: 1rem; color: var(--ink); letter-spacing: -0.04em;
            text-decoration: none;
        }
        .navbar-brand .logo-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: var(--grad-metallic);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem;
            box-shadow: 0 6px 24px rgba(163,177,192,0.2);
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 6px 24px rgba(163,177,192,0.2); }
            50% { box-shadow: 0 6px 40px rgba(163,177,192,0.35); }
        }
        .navbar-right { display: flex; align-items: center; gap: 14px; }

        /* User dropdown */
        .user-menu { position: relative; }
        .user-menu-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 5px 14px 5px 5px; border-radius: 50px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--ink); cursor: pointer;
            transition: all 0.3s var(--ease-out);
            font-family: var(--font-body);
        }
        .user-menu-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.14);
            box-shadow: 0 0 30px rgba(163,177,192,0.08);
        }
        .user-menu-btn .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--grad-metallic);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-sans); font-weight: 700;
            font-size: 0.8rem; color: #000;
            box-shadow: 0 2px 10px rgba(163,177,192,0.15);
        }
        .user-menu-btn .user-name {
            font-size: 0.85rem; font-weight: 500; color: var(--ink);
            max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .user-menu-btn .chevron {
            font-size: 0.65rem; color: var(--ink-4);
            transition: transform 0.3s var(--ease-out);
        }
        .user-menu.open .user-menu-btn .chevron { transform: rotate(180deg); }

        .user-dropdown {
            display: none; position: absolute; top: calc(100% + 10px); right: 0;
            min-width: 220px; padding: 8px;
            border-radius: var(--r-lg);
            background: rgba(16,18,24,0.96);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(40px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: dropIn 0.25s var(--ease-out) forwards;
        }
        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .user-menu.open .user-dropdown { display: block; }
        .dropdown-header {
            padding: 12px; border-radius: var(--r-sm);
            margin-bottom: 6px;
            background: rgba(255,255,255,0.02);
        }
        .dropdown-header .d-name {
            font-family: var(--font-sans); font-weight: 600;
            font-size: 0.9rem; color: var(--ink);
        }
        .dropdown-header .d-handle {
            font-size: 0.75rem; color: var(--ink-4);
            font-family: var(--font-mono); margin-top: 2px;
        }
        .dropdown-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }
        .dropdown-item {
            display: flex; align-items: center; gap: 10px; width: 100%;
            padding: 10px 12px; border-radius: var(--r-sm);
            background: transparent; border: none; color: var(--ink-3);
            font-family: var(--font-body); font-size: 0.85rem; font-weight: 500;
            text-align: left; cursor: pointer; transition: all 0.2s var(--ease-out);
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--ink); }
        .dropdown-item.danger { color: var(--ink-4); }
        .dropdown-item.danger:hover { background: rgba(248,113,113,0.06); color: #fca5a5; }
        .dropdown-item .d-icon { font-size: 0.95rem; width: 20px; text-align: center; }

        /* ========== APP LAYOUT ========== */
        .app-layout { display: flex; min-height: 100vh; position: relative; z-index: 1; padding-top: 64px; }

        /* Sidebar */
        .sidebar {
            width: 250px; min-width: 250px;
            background: rgba(8,8,12,0.6);
            border-right: 1px solid rgba(255,255,255,0.04);
            display: flex; flex-direction: column;
            padding: 24px 12px;
            position: fixed; top: 64px; bottom: 0; left: 0;
            overflow-y: auto;
        }
        .sidebar-brand {
            display: flex; align-items: center; gap: 10px;
            padding: 4px 10px; margin-bottom: 24px;
            font-family: var(--font-sans); font-weight: 700;
            font-size: 0.95rem; color: var(--ink); letter-spacing: -0.03em;
        }
        .sidebar-brand .logo-icon {
            width: 30px; height: 30px; border-radius: 8px;
            background: var(--grad-metallic);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
        }
        .sidebar-nav { display: flex; flex-direction: column; gap: 3px; }
        .sidebar-nav .nav-section-label {
            font-size: 0.62rem; font-weight: 700; color: var(--ink-4);
            letter-spacing: 0.12em; text-transform: uppercase;
            padding: 14px 10px 6px;
        }
        .sidebar-nav button {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 10px 10px;
            border-radius: var(--r-sm);
            background: transparent; border: 1px solid transparent;
            color: var(--ink-3); font-family: var(--font-body);
            font-size: 0.88rem; font-weight: 500;
            text-align: left; cursor: pointer;
            transition: all 0.2s var(--ease-out);
        }
        .sidebar-nav button:hover {
            background: rgba(255,255,255,0.035); color: var(--ink);
        }
        .sidebar-nav button.active {
            background: rgba(163,177,192,0.08); color: var(--ink);
            border-color: rgba(163,177,192,0.12);
            box-shadow: 0 0 24px rgba(163,177,192,0.04);
        }
        .sidebar-nav button .nav-icon { font-size: 1rem; width: 22px; text-align: center; }
        .sidebar-nav .nav-create {
            background: rgba(163,177,192,0.05);
            border: 1px dashed rgba(163,177,192,0.18);
            color: var(--silver-light); margin-top: 6px;
        }
        .sidebar-nav .nav-create:hover {
            background: rgba(163,177,192,0.12);
            border-color: rgba(163,177,192,0.25);
            box-shadow: 0 0 30px rgba(163,177,192,0.06);
        }

        /* Main */
        .main-content {
            flex: 1; margin-left: 250px;
            padding: 36px;
            min-height: calc(100vh - 64px);
        }
        .content-header { margin-bottom: 28px; }
        .content-header h2 {
            font-family: var(--font-sans); font-weight: 700;
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            letter-spacing: -0.05em; color: var(--ink);
        }
        .content-header p {
            color: var(--ink-3); font-size: 0.9rem; margin-top: 6px;
        }

        /* Room list */
        .room-list { display: flex; flex-direction: column; gap: 8px; }
        .room-item {
            display: flex; align-items: center; gap: 16px;
            padding: 18px 22px; border-radius: var(--r-lg);
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s var(--ease-out);
            cursor: pointer;
            position: relative; overflow: hidden;
        }
        .room-item::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(163,177,192,0.04) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.4s;
        }
        .room-item:hover::before { opacity: 1; }
        .room-item:hover {
            background: rgba(255,255,255,0.035);
            border-color: rgba(255,255,255,0.1);
            transform: translateX(6px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .room-item-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(163,177,192,0.06);
            border: 1px solid rgba(163,177,192,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
            transition: all 0.4s var(--ease-out);
        }
        .room-item:hover .room-item-icon {
            background: rgba(163,177,192,0.12);
            box-shadow: 0 0 24px rgba(163,177,192,0.08);
            transform: scale(1.05);
        }
        .room-item-info { flex: 1; min-width: 0; }
        .room-item-info h4 {
            font-family: var(--font-sans); font-weight: 600;
            font-size: 0.95rem; color: var(--ink);
            letter-spacing: -0.02em; margin-bottom: 3px;
        }
        .room-item-info p {
            font-size: 0.8rem; color: var(--ink-4);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .room-item-right {
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .room-badge {
            font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em;
            text-transform: uppercase; padding: 4px 12px; border-radius: 50px;
        }
        .badge-private { background: rgba(251,191,36,0.06); color: var(--amber); border: 1px solid rgba(251,191,36,0.12); }
        .badge-public { background: rgba(74,222,128,0.05); color: var(--green); border: 1px solid rgba(74,222,128,0.1); }
        .room-item-meta {
            font-size: 0.72rem; color: var(--ink-4);
            font-family: var(--font-mono); text-align: right; line-height: 1.5;
        }
        .room-arrow {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
            color: var(--ink-4); font-size: 0.8rem;
            transition: all 0.3s var(--ease-out);
        }
        .room-item:hover .room-arrow {
            background: rgba(163,177,192,0.12); color: var(--ink);
            transform: translateX(2px);
        }

        /* Create form */
        .create-form-card {
            padding: 24px 28px; border-radius: var(--r-lg);
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 28px; display: none;
        }
        .create-form-card.show {
            display: block;
            animation: fadeSlideUp 0.4s var(--ease-out) forwards;
        }
        .create-form-card h3 {
            font-family: var(--font-sans); font-weight: 700;
            font-size: 1.05rem; letter-spacing: -0.03em; margin-bottom: 18px;
        }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        /* Profile */
        .profile-card {
            padding: 32px; border-radius: var(--r-lg);
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            max-width: 480px;
        }
        .profile-card h3 {
            font-family: var(--font-sans); font-weight: 700;
            font-size: 1.05rem; letter-spacing: -0.03em; margin-bottom: 22px;
        }
        .success-msg {
            color: var(--green); font-size: 0.82rem; margin-bottom: 14px;
            display: none; align-items: center; gap: 6px; font-weight: 500;
        }
        .success-msg.show { display: flex; animation: fadeSlideUp 0.3s var(--ease-out) forwards; }
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--ink-4);
        }
        .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .empty-state p { font-size: 0.92rem; color: var(--ink-3); }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); z-index: 50; transition: transform 0.3s var(--ease-out); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .top-navbar { padding: 0 16px; }
            .create-form-card .form-row { flex-direction: column; gap: 0; }
            .user-menu-btn .user-name { display: none; }
        }
        .mobile-menu-btn {
            display: none; width: 38px; height: 38px; border-radius: var(--r-sm);
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            color: var(--ink); font-size: 1.1rem;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.2s var(--ease-out);
        }
        .mobile-menu-btn:hover { background: rgba(255,255,255,0.1); }
        @media (max-width: 768px) { .mobile-menu-btn { display: flex !important; } }
        .sidebar-backdrop {
            display: none; position: fixed; inset: 0; z-index: 40;
            background: rgba(0,0,0,0.5);
        }
        .sidebar-backdrop.active { display: block; }
    </style>
</head>
<body>

<!-- Backgrounds -->
<div class="bg-videos">
    <video muted autoplay loop playsinline preload="auto" src="/images/vid-app.mp4"></video>
</div>
</div>
<canvas id="app-canvas"></canvas>
<div class="bg-scenes"><div class="bg-scene"></div><div class="bg-scene"></div><div class="bg-scene"></div></div>
<div class="bg-orbs"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="bg-particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>
<div class="ambient-bg"></div>
<div class="ambient-grid"></div>

<!-- ========== TOP NAVBAR ========== -->
<nav class="top-navbar">
    <div style="display: flex; align-items: center; gap: 12px;">
        <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
        <a href="/app" class="navbar-brand">
            <img src="/images/logo-tessihz.svg" alt="TessiHz" class="navbar-logo">
        </a>
    </div>
    <div class="navbar-right">
        <div class="user-menu" id="user-menu">
            <button class="user-menu-btn" onclick="toggleUserMenu()">
                <div class="avatar" id="nav-avatar"></div>
                <span class="user-name" id="nav-username"></span>
                <span class="chevron">▾</span>
            </button>
            <div class="user-dropdown">
                <div class="dropdown-header">
                    <div class="d-name" id="d-name"></div>
                    <div class="d-handle" id="d-handle"></div>
                </div>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="location.href='/app'"><span class="d-icon">🏠</span> Trang chủ</button>
                <button class="dropdown-item" onclick="showPage('profile'); closeSidebar();"><span class="d-icon">👤</span> Hồ sơ của tôi</button>
                <button class="dropdown-item" onclick="showPage('my-rooms'); closeSidebar();"><span class="d-icon">📂</span> Phòng của tôi</button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item danger" onclick="doLogout()"><span class="d-icon">↪</span> Đăng xuất</button>
            </div>
        </div>
    </div>
</nav>

<!-- ========== APP ========== -->
<div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-backdrop" onclick="closeSidebar()"></div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Khám phá</div>
            <button class="active" onclick="showPage('rooms', this)">
                <span class="nav-icon">🌐</span> Cộng đồng
            </button>
            <button onclick="showPage('my-rooms', this)">
                <span class="nav-icon">📂</span> Phòng của tôi
            </button>
            <div class="nav-section-label">Hành động</div>
            <button class="nav-create" onclick="toggleCreateForm()">
                <span class="nav-icon">✨</span> Tạo phòng mới
            </button>
        </nav>
    </div>

    <!-- Content -->
    <div class="main-content">
        <div class="content-header">
            <h2 id="page-heading">Cộng đồng</h2>
            <p id="page-subtitle">Khám phá các phòng nhạc công khai</p>
        </div>

        <div class="create-form-card" id="create-form">
            <h3>✨ Tạo phòng mới</h3>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Tên phòng</label>
                    <input type="text" class="form-input" id="new-room-name" placeholder="Ví dụ: chill-summer">
                </div>
                <div class="form-group">
                    <label class="form-label">Mô tả</label>
                    <input type="text" class="form-input" id="new-room-desc" placeholder="Phòng nghe nhạc chill...">
                </div>
            </div>
            <div class="form-group" style="margin-top: 14px; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="new-room-private" style="width: 16px; height: 16px; accent-color: var(--silver); cursor: pointer;" onchange="toggleRoomPasswordField()">
                <label for="new-room-private" style="font-size: 0.85rem; color: var(--ink-2); cursor: pointer;">🔒 Phòng riêng tư</label>
            </div>
            <div class="form-group" id="room-password-group" style="display: none; margin-top: 0;">
                <label class="form-label">Mật khẩu phòng</label>
                <input type="text" class="form-input" id="new-room-password" placeholder="Người khác cần mật khẩu này để vào">
            </div>
            <button class="btn btn-primary" onclick="createRoom()" style="margin-top: 16px; padding: 11px 30px; font-size: 0.88rem;">✨ Tạo phòng</button>
        </div>

        <div class="room-list" id="page-rooms">
            <div class="empty-state"><div class="empty-icon">🌐</div><p>Đang tải...</p></div>
        </div>
        <div class="room-list" id="page-my-rooms" style="display:none;">
            <div class="empty-state"><div class="empty-icon">📂</div><p>Đang tải...</p></div>
        </div>
        <div id="page-profile" style="display:none;">
            <div class="profile-card">
                <div class="success-msg" id="profile-success">✅ Đã lưu thay đổi!</div>
                <h3>👤 Thông tin cá nhân</h3>
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-input" id="prof-username" disabled style="opacity: 0.4;">
                </div>
                <div class="form-group">
                    <label class="form-label">Tên hiển thị</label>
                    <input type="text" class="form-input" id="prof-display" placeholder="Tên hiển thị">
                </div>
                <button class="btn btn-primary" onclick="saveProfile()" style="padding: 11px 30px; font-size: 0.88rem;">Lưu thay đổi</button>
            </div>
        </div>
    </div>
</div>

<script>
    let myUser = null;

    // === CANVAS BG ===
    const canvas = document.getElementById('app-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], w, h;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    class P {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.vx = (Math.random() - 0.5) * 0.25; this.vy = (Math.random() - 0.5) * 0.25;
            this.size = Math.random() * 1.8 + 0.5; this.opacity = Math.random() * 0.3 + 0.08;
            this.hue = Math.random() < 0.5 ? 210 : 240;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > w) this.vx *= -1;
            if (this.y < 0 || this.y > h) this.vy *= -1;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.hue}, 20%, 70%, ${this.opacity})`; ctx.fill();
        }
    }
    for (let i = 0; i < 60; i++) particles.push(new P());
    (function loop() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d < 100) {
                    ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(163,177,192,${0.04 * (1 - d/100)})`; ctx.lineWidth = 0.5; ctx.stroke();
                }
            }
        }
        requestAnimationFrame(loop);
    })();

    // === AUTH CHECK ===
    fetch('/api/me').then(r => r.json()).then(data => {
        if (!data.loggedIn) window.location.href = '/login';
        myUser = data.user;
        document.getElementById('nav-avatar').textContent = data.user.avatar;
        document.getElementById('nav-username').textContent = data.user.displayName;
        document.getElementById('d-name').textContent = data.user.displayName;
        document.getElementById('d-handle').textContent = '@' + data.user.username;
        document.getElementById('prof-username').value = data.user.username;
        document.getElementById('prof-display').value = data.user.displayName;
        loadCommunityRooms(); loadMyRooms();
    });

    // === NAV ===
    function showPage(page, btn) {
        ['page-rooms', 'page-my-rooms', 'page-profile'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('page-' + page).style.display = 'block';
        document.querySelectorAll('.sidebar-nav button').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        const headings = {
            'rooms': ['Cộng đồng', 'Khám phá các phòng nhạc công khai'],
            'my-rooms': ['Phòng của tôi', 'Các phòng bạn đã tạo'],
            'profile': ['Hồ sơ của tôi', 'Quản lý thông tin cá nhân']
        };
        document.getElementById('page-heading').textContent = headings[page]?.[0] || '';
        document.getElementById('page-subtitle').textContent = headings[page]?.[1] || '';
        closeSidebar();
    }
    function toggleCreateForm() { document.getElementById('create-form').classList.toggle('show'); closeSidebar(); }

    // === ROOMS ===
    function loadCommunityRooms() {
        fetch('/api/rooms').then(r => r.json()).then(data => {
            const box = document.getElementById('page-rooms');
            if (!data.ok || data.rooms.length === 0) {
                box.innerHTML = '<div class="empty-state"><div class="empty-icon">🌐</div><p>Chưa có phòng nào. Hãy tạo phòng đầu tiên!</p></div>';
                return;
            }
            box.innerHTML = data.rooms.map(r => {
                const time = new Date(r.createdAt).toLocaleDateString('vi', { day: 'numeric', month: 'short' });
                return `
                <div class="room-item" onmousemove="trackRoomMouse(event, this)" onclick="location.href='/room/${r.id}'">
                    <div class="room-item-icon">🎵</div>
                    <div class="room-item-info"><h4>${r.name}</h4><p>${r.description || 'Không có mô tả'}</p></div>
                    <div class="room-item-right">
                        <span class="room-badge ${r.isPrivate ? 'badge-private' : 'badge-public'}">${r.isPrivate ? '🔒 Riêng' : '🌐 Công khai'}</span>
                        <div class="room-item-meta"><div>${r.ownerName}</div><div>${time}</div></div>
                        <div class="room-arrow">→</div>
                    </div>
                </div>`;
            }).join('');
        });
    }
    function loadMyRooms() {
        fetch('/api/my-rooms').then(r => r.json()).then(data => {
            const box = document.getElementById('page-my-rooms');
            if (!data.ok || data.rooms.length === 0) {
                box.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><p>Bạn chưa tạo phòng nào.</p></div>';
                return;
            }
            box.innerHTML = data.rooms.map(r => `
                <div class="room-item" onmousemove="trackRoomMouse(event, this)" onclick="location.href='/room/${r.id}'">
                    <div class="room-item-icon">🎵</div>
                    <div class="room-item-info"><h4>${r.name}</h4><p>${r.description || 'Không có mô tả'}</p></div>
                    <div class="room-item-right">
                        <span class="room-badge ${r.isPrivate ? 'badge-private' : 'badge-public'}">${r.isPrivate ? '🔒 Riêng' : '🌐 Công khai'}</span>
                        <div class="room-item-meta"><div>${new Date(r.createdAt).toLocaleDateString('vi', {day:'numeric',month:'short'})}</div></div>
                        <div class="room-arrow">→</div>
                    </div>
                </div>
            `).join('');
        });
    }
    function trackRoomMouse(e, el) {
        const rect = el.getBoundingClientRect();
        el.style.setProperty('--mx', ((e.clientX - rect.left) / rect.width * 100) + '%');
        el.style.setProperty('--my', ((e.clientY - rect.top) / rect.height * 100) + '%');
    }

    // === CREATE ROOM ===
    function toggleRoomPasswordField() {
        const isPrivate = document.getElementById('new-room-private').checked;
        document.getElementById('room-password-group').style.display = isPrivate ? 'block' : 'none';
    }

    function createRoom() {
        const name = document.getElementById('new-room-name').value.trim();
        const desc = document.getElementById('new-room-desc').value.trim();
        const isPrivate = document.getElementById('new-room-private').checked;
        const roomPassword = document.getElementById('new-room-password')?.value || '';
        if (!name) return alert('Nhập tên phòng!');
        if (isPrivate && !roomPassword) return alert('Phòng riêng tư cần có mật khẩu!');
        fetch('/api/rooms', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description: desc, isPrivate, password: roomPassword })
        }).then(r => r.json()).then(data => {
            if (!data.ok) return alert(data.message);
            document.getElementById('new-room-name').value = '';
            document.getElementById('new-room-desc').value = '';
            document.getElementById('new-room-private').checked = false;
            document.getElementById('room-password-group').style.display = 'none';
            document.getElementById('create-form').classList.remove('show');
            loadCommunityRooms(); loadMyRooms();
            const btns = document.querySelectorAll('.sidebar-nav button');
            showPage('my-rooms', btns[1]);
        });
    }

    // === PROFILE ===
    function saveProfile() {
        const displayName = document.getElementById('prof-display').value.trim();
        if (!displayName) return alert('Nhập tên hiển thị!');
        fetch('/api/profile', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ displayName })
        }).then(r => r.json()).then(data => {
            if (!data.ok) return alert('Có lỗi!');
            document.getElementById('nav-username').textContent = data.user.displayName;
            document.getElementById('d-name').textContent = data.user.displayName;
            const el = document.getElementById('profile-success');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        });
    }

    // === DROPDOWN ===
    function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('open'); }
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#user-menu')) document.getElementById('user-menu').classList.remove('open');
    });

    function doLogout() { fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/login'); }

    // === MOBILE SIDEBAR ===
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.querySelector('.sidebar-backdrop').classList.add('active');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.querySelector('.sidebar-backdrop').classList.remove('active');
    }
</script>

</body>
</html>
