<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu — TessiHz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; position: relative; overflow: hidden;
        }
        .bg-videos { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-videos video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .bg-videos::after {
            content: ''; position: absolute; inset: 0; z-index: 2;
            background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,0,0,0.7) 0%, transparent 70%),
                        linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.6) 100%);
        }
        .reset-card {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px; padding: 44px 40px;
            border-radius: 24px;
            background: rgba(18,20,26,0.95);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(60px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 120px rgba(163,177,192,0.04);
            animation: modalIn 0.5s ease-out forwards;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .reset-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }
        .reset-logo {
            width: 52px; height: 52px; border-radius: 16px;
            background: linear-gradient(135deg, #6b7280 0%, #9ca3af 40%, #c8d6e5 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-bottom: 22px;
            box-shadow: 0 8px 32px rgba(163,177,192,0.2);
        }
        .reset-card h2 {
            font-family: 'Space Grotesk', sans-serif; font-weight: 700;
            font-size: 1.6rem; letter-spacing: -0.04em;
            margin-bottom: 6px; color: #D7E2EA;
        }
        .reset-card .subtitle {
            color: #8a95a5; font-size: 0.92rem; margin-bottom: 28px;
        }
        .error-box {
            padding: 12px 16px; border-radius: 50px;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.12);
            color: #fca5a5; font-size: 0.82rem; font-weight: 500;
            margin-bottom: 16px; display: none; text-align: center;
            font-family: 'DM Sans', sans-serif;
        }
        .error-box.show { display: block; animation: shakeIn 0.4s ease-out; }
        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .success-box {
            padding: 12px 16px; border-radius: 50px;
            background: rgba(74,222,128,0.06);
            border: 1px solid rgba(74,222,128,0.12);
            color: #86efac; font-size: 0.82rem; font-weight: 500;
            margin-bottom: 16px; display: none; text-align: center;
            font-family: 'DM Sans', sans-serif;
        }
        .success-box.show { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .form-group { margin-bottom: 18px; position: relative; z-index: 1; }
        .form-label {
            display: block; margin-bottom: 8px; color: #8a95a5;
            font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }
        .form-input {
            width: 100%; padding: 14px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07); border-radius: 50px;
            color: #D7E2EA; font-size: 0.93rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.35s ease-out;
        }
        .form-input:focus {
            border-color: rgba(163,177,192,0.35);
            background: rgba(163,177,192,0.04);
            box-shadow: 0 0 0 4px rgba(163,177,192,0.06);
            outline: none;
        }
        .form-input::placeholder { color: #3a4555; }
        .btn-primary {
            width: 100%; padding: 14px; margin-top: 10px;
            background: linear-gradient(135deg, #6b7280 0%, #9ca3af 40%, #c8d6e5 100%);
            color: #000; border: none; border-radius: 50px;
            font-family: 'DM Sans', sans-serif; font-size: 0.93rem; font-weight: 600;
            cursor: pointer; transition: all 0.35s ease-out;
            box-shadow: 0 4px 24px rgba(163,177,192,0.2);
            letter-spacing: -0.01em;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(163,177,192,0.35);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .back-link {
            text-align: center; margin-top: 22px;
            color: #5a6577; font-size: 0.88rem;
            font-family: 'DM Sans', sans-serif;
        }
        .back-link a {
            color: #c8d6e5; cursor: pointer; font-weight: 600;
            text-decoration: none; transition: all 0.2s;
        }
        .back-link a:hover { color: #D7E2EA; text-shadow: 0 0 20px rgba(200,214,229,0.3); }
        .strength-meter {
            margin-top: 8px; height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.06); overflow: hidden;
        }
        .strength-fill {
            height: 100%; border-radius: 2px; transition: all 0.3s ease;
            width: 0%;
        }
        .strength-text {
            font-size: 0.72rem; margin-top: 4px; font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

<div class="bg-videos">
    <video muted autoplay loop playsinline preload="auto" src="/images/vid-landing.mp4"></video>
</div>

<div class="reset-card">
    <div class="reset-logo">🔑</div>
    <h2>Đặt lại mật khẩu</h2>
    <p class="subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>

    <div class="error-box" id="error-box"></div>
    <div class="success-box" id="success-box"></div>

    <form onsubmit="doReset(event)">
        <div class="form-group">
            <label class="form-label">Mật khẩu mới</label>
            <input type="password" class="form-input" id="new-password"
                   placeholder="Ít nhất 6 ký tự" required minlength="6" maxlength="128"
                   oninput="checkStrength(this.value)">
            <div class="strength-meter"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-text" id="strength-text"></div>
        </div>
        <div class="form-group">
            <label class="form-label">Nhập lại mật khẩu</label>
            <input type="password" class="form-input" id="confirm-password"
                   placeholder="Nhập lại mật khẩu mới" required minlength="6">
        </div>
        <button type="submit" class="btn-primary" id="reset-btn">Đặt lại mật khẩu</button>
    </form>

    <div class="back-link">
        <a href="/login">← Quay lại đăng nhập</a>
    </div>
</div>

<script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (!resetToken) {
        document.getElementById('error-box').textContent = 'Link reset không hợp lệ!';
        document.getElementById('error-box').classList.add('show');
        document.getElementById('reset-btn').disabled = true;
    }

    function checkStrength(password) {
        let score = 0;
        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        const fill = document.getElementById('strength-fill');
        const text = document.getElementById('strength-text');

        if (password.length === 0) {
            fill.style.width = '0%'; text.textContent = ''; return;
        }

        if (score <= 2) {
            fill.style.width = '33%'; fill.style.background = '#f87171';
            text.textContent = 'Yếu'; text.style.color = '#f87171';
        } else if (score <= 4) {
            fill.style.width = '66%'; fill.style.background = '#fbbf24';
            text.textContent = 'Trung bình'; text.style.color = '#fbbf24';
        } else {
            fill.style.width = '100%'; fill.style.background = '#4ade80';
            text.textContent = 'Mạnh'; text.style.color = '#4ade80';
        }
    }

    async function doReset(e) {
        e.preventDefault();
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');
        const btn = document.getElementById('reset-btn');

        errorBox.classList.remove('show');
        successBox.classList.remove('show');

        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
            errorBox.textContent = 'Mật khẩu nhập lại không khớp!';
            errorBox.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Đang xử lý...';

        try {
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: resetToken, newPassword })
            });
            const data = await res.json();

            if (!data.ok) {
                errorBox.textContent = data.message;
                errorBox.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Đặt lại mật khẩu';
                return;
            }

            successBox.textContent = '✓ Đặt lại mật khẩu thành công! Đang chuyển...';
            successBox.classList.add('show');
            setTimeout(() => { window.location.href = '/login'; }, 1500);
        } catch {
            errorBox.textContent = 'Có lỗi xảy ra!';
            errorBox.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Đặt lại mật khẩu';
        }
    }
</script>

</body>
</html>
